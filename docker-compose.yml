services:
  web:
    image: nginx:1.28.2-alpine
    container_name: nginx-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - '${NGINX_PORT}:80'
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f","http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - app
  app:
    image: my-web-app:1.0
    container_name: my-web
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - PORT=${FLASK_PORT}   
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge