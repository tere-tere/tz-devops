user  nobody; #минимальные права
worker_processes  auto; #кол-во процессов

error_log  /var/log/nginx/error.log notice; # (warn, error, crit, alert, emerg)
pid        /var/run/nginx.pid; #main pid save

events {
    worker_connections  1024; # 1 process = 1024
}

http {
    include       mime.types; # http,json...
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Gzip settings
    gzip  on;
    gzip_disable "msie6";

    #include /etc/nginx/conf.d/*.conf; не берёт лишних дефолт. конфигов

    server {
        listen       80;
        server_name  127.0.0.1;

        # Main location block
         location / {
            proxy_pass http://app:8080;  # Прокси на локальный сервер на порту 80
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Error page setup
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}